<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"
        />
        <title>Gemini Design Generator</title>
        <style>
            :root {
                --primary-color: #18a0fb;
                --primary-hover: #0d8ce0;
                --bg-color: #2c2c2c;
                --surface-color: #3c3c3c;
                --text-color: #ffffff;
                --text-secondary: #b3b3b3;
                --border-color: #444444;
                --input-bg: #1e1e1e;
                --radius: 8px;
                --spacing-sm: 8px;
                --spacing-md: 16px;
                --spacing-lg: 24px;
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    "Segoe UI",
                    Roboto,
                    sans-serif;
                padding: var(--spacing-lg);
                margin: 0;
                background-color: var(--bg-color);
                color: var(--text-color);
                height: 100vh;
                box-sizing: border-box;
                display: flex;
                flex-direction: column;
            }

            h2 {
                margin: 0 0 var(--spacing-sm) 0;
                font-size: 20px;
                font-weight: 600;
                letter-spacing: -0.01em;
            }

            p.subtitle {
                margin: 0 0 var(--spacing-lg) 0;
                font-size: 13px;
                color: var(--text-secondary);
                line-height: 1.5;
            }

            .input-group {
                margin-bottom: var(--spacing-lg);
                display: flex;
                flex-direction: column;
            }

            .input-group.grow {
                flex-grow: 1;
            }

            label {
                display: block;
                margin-bottom: var(--spacing-sm);
                font-size: 13px;
                font-weight: 500;
                color: var(--text-secondary);
            }

            textarea,
            input[type="password"] {
                width: 100%;
                padding: var(--spacing-md);
                border: 1px solid var(--border-color);
                background-color: var(--input-bg);
                color: var(--text-color);
                border-radius: var(--radius);
                box-sizing: border-box;
                font-family: inherit;
                font-size: 14px;
                line-height: 1.5;
                transition: border-color 0.2s;
            }

            textarea {
                resize: none;
                height: 100%;
                min-height: 120px;
            }

            textarea:focus,
            input:focus {
                outline: none;
                border-color: var(--primary-color);
            }

            /* Tabs */
            .tabs {
                display: flex;
                border-bottom: 1px solid var(--border-color);
                margin-bottom: var(--spacing-lg);
            }
            .tab {
                padding: var(--spacing-sm) var(--spacing-md);
                cursor: pointer;
                color: var(--text-secondary);
                font-weight: 500;
                font-size: 13px;
            }
            .tab.active {
                color: var(--primary-color);
                border-bottom: 2px solid var(--primary-color);
            }
            .tab-content {
                display: none;
                height: 100%;
                flex-direction: column;
            }
            .tab-content.active {
                display: flex;
            }

            /* Image Upload Styles */
            .upload-area {
                border: 1px dashed var(--border-color);
                border-radius: var(--radius);
                padding: var(--spacing-md);
                text-align: center;
                cursor: pointer;
                transition: all 0.2s;
                background-color: var(--input-bg);
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 80px;
            }

            .upload-area:hover {
                border-color: var(--text-secondary);
                background-color: var(--surface-color);
            }

            .upload-area.has-image {
                border-style: solid;
                padding: 0;
                overflow: hidden;
                background-color: black;
            }

            .upload-placeholder {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                color: var(--text-secondary);
                font-size: 13px;
            }

            .upload-icon {
                width: 24px;
                height: 24px;
                fill: currentColor;
            }

            #previewImage {
                max-width: 100%;
                max-height: 200px;
                object-fit: contain;
                display: none;
            }

            .remove-image-btn {
                position: absolute;
                top: 8px;
                right: 8px;
                background: rgba(0, 0, 0, 0.6);
                color: white;
                border: none;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                cursor: pointer;
                display: none;
                align-items: center;
                justify-content: center;
                font-size: 14px;
            }

            .actions {
                display: flex;
                gap: var(--spacing-md);
                margin-top: auto;
                padding-top: var(--spacing-md);
            }

            button {
                border: none;
                padding: 12px 24px;
                border-radius: var(--radius);
                cursor: pointer;
                font-weight: 600;
                font-size: 14px;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            button#generateBtn,
            button#saveKeyBtn {
                background-color: var(--primary-color);
                color: white;
            }

            button#saveKeyBtn {
                width: 100%;
            }
            button#generateBtn {
                flex: 2;
            }

            button:hover {
                background-color: var(--primary-hover);
            }

            button:disabled {
                background-color: var(--surface-color);
                color: var(--text-secondary);
                cursor: not-allowed;
                opacity: 0.7;
            }

            button.secondary {
                background-color: transparent;
                border: 1px solid var(--border-color);
                color: var(--text-secondary);
            }

            button.secondary:hover {
                background-color: var(--surface-color);
                color: var(--text-color);
            }

            button#cancelBtn {
                background-color: transparent;
                border: 1px solid var(--border-color);
                color: var(--text-secondary);
                flex: 1;
            }
            button#cancelBtn:hover {
                background-color: var(--surface-color);
                color: var(--text-color);
            }
        </style>
    </head>
    <body>
        <div class="tabs">
            <div
                class="tab active"
                data-tab="generate"
            >
                Generate
            </div>
            <div
                class="tab"
                data-tab="settings"
            >
                Settings
            </div>
        </div>

        <!-- Generate Tab -->
        <div
            id="tab-generate"
            class="tab-content active"
            style="flex-grow: 1"
        >
            <h2>Gemini Design Generator</h2>
            <p class="subtitle">
                Describe the UI you want to create, or upload a reference
                sketch.
            </p>

            <div class="input-group">
                <label>Context (Frame to Modify)</label>
                <div style="display: flex; gap: 8px; align-items: center">
                    <div
                        id="contextPreview"
                        style="
                            width: 40px;
                            height: 40px;
                            background: #333;
                            border-radius: 4px;
                            display: none;
                            background-size: cover;
                            background-position: center;
                        "
                    ></div>
                    <div style="flex-grow: 1">
                        <div
                            id="contextName"
                            style="
                                font-size: 13px;
                                color: var(--text-secondary);
                            "
                        >
                            No frame selected
                        </div>
                    </div>
                    <button
                        id="selectContextBtn"
                        class="secondary"
                        style="padding: 4px 8px; font-size: 11px"
                    >
                        Set Context
                    </button>
                </div>
                <div
                    style="
                        margin-top: 8px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                    "
                >
                    <input
                        type="checkbox"
                        id="replaceContext"
                        disabled
                    />
                    <label
                        for="replaceContext"
                        style="margin: 0; font-weight: 400; cursor: pointer"
                        >Replace content of this frame</label
                    >
                </div>
            </div>

            <div class="input-group grow">
                <label for="prompt">Design Prompt</label>
                <textarea
                    id="prompt"
                    placeholder="e.g. A modern login screen for a fitness app..."
                ></textarea>
            </div>

            <div class="input-group">
                <label>Reference Image (Optional)</label>
                <div
                    class="upload-area"
                    id="dropZone"
                >
                    <input
                        type="file"
                        id="imageInput"
                        accept="image/png, image/jpeg"
                        hidden
                    />

                    <div
                        class="upload-placeholder"
                        id="uploadPlaceholder"
                    >
                        <svg
                            class="upload-icon"
                            viewBox="0 0 24 24"
                        >
                            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" />
                        </svg>
                        <span>Click to upload image</span>
                    </div>

                    <img
                        id="previewImage"
                        alt="Preview"
                    />
                    <button
                        class="remove-image-btn"
                        id="removeImage"
                    >
                        ×
                    </button>
                </div>
            </div>

            <div class="actions">
                <button id="cancelBtn">Cancel</button>

                <button id="generateBtn"><span>Generate Design</span></button>
            </div>
        </div>

        <!-- Settings Tab -->
        <div
            id="tab-settings"
            class="tab-content"
        >
            <h2>Settings</h2>
            <p class="subtitle">Configure your Gemini API access.</p>

            <div class="input-group">
                <label for="apiKey">Gemini API Key</label>
                <input
                    type="password"
                    id="apiKey"
                    placeholder="Enter your Gemini API Key"
                />
                <p
                    style="
                        font-size: 11px;
                        color: var(--text-secondary);
                        margin-top: 4px;
                    "
                >
                    Key is stored locally in Figma client storage.
                </p>
            </div>

            <button
                id="saveKeyBtn"
                style="margin-top: 8px"
            >
                Save & Validate Key
            </button>
            <p
                id="keyStatus"
                style="font-size: 12px; margin-top: 8px; min-height: 18px"
            ></p>
        </div>

        <script>
            // Tabs Logic
            const tabs = document.querySelectorAll(".tab");
            const contents = document.querySelectorAll(".tab-content");

            tabs.forEach((tab) => {
                tab.onclick = () => {
                    const target = tab.dataset.tab;

                    tabs.forEach((t) => t.classList.remove("active"));
                    tab.classList.add("active");

                    contents.forEach((c) => {
                        c.classList.remove("active");
                        if (c.id === `tab-${target}`) c.classList.add("active");
                    });
                };
            });

            const generateBtn = document.getElementById("generateBtn");
            const cancelBtn = document.getElementById("cancelBtn");
            const promptInput = document.getElementById("prompt");
            const apiKeyInput = document.getElementById("apiKey");
            const saveKeyBtn = document.getElementById("saveKeyBtn");
            const keyStatus = document.getElementById("keyStatus");

            const dropZone = document.getElementById("dropZone");
            const imageInput = document.getElementById("imageInput");
            const previewImage = document.getElementById("previewImage");
            const uploadPlaceholder =
                document.getElementById("uploadPlaceholder");
            const removeImageBtn = document.getElementById("removeImage");

            // Context UI
            const selectContextBtn =
                document.getElementById("selectContextBtn");
            const contextName = document.getElementById("contextName");
            const contextPreview = document.getElementById("contextPreview");
            const replaceContextCheckbox =
                document.getElementById("replaceContext");

            let selectedImageData = null; // Reference Image
            let selectedContextTree = null; // Context JSON
            let selectedContextImage = null; // Context Image DataURL
            let loadingInterval = null;

            // File Selection Logic
            dropZone.onclick = (e) => {
                if (e.target !== removeImageBtn && !selectedImageData) {
                    imageInput.click();
                }
            };

            imageInput.onchange = (e) => {
                const file = e.target.files[0];
                handleFile(file);
            };

            function handleFile(file) {
                if (!file) return;

                if (!file.type.startsWith("image/")) {
                    alert("Please upload an image file.");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (e) => {
                    selectedImageData = e.target.result; // data URL

                    // Update UI
                    previewImage.src = selectedImageData;
                    previewImage.style.display = "block";
                    uploadPlaceholder.style.display = "none";
                    dropZone.classList.add("has-image");
                    removeImageBtn.style.display = "flex";
                };
                reader.readAsDataURL(file);
            }

            removeImageBtn.onclick = (e) => {
                e.stopPropagation();
                selectedImageData = null;
                imageInput.value = ""; // Reset input

                previewImage.style.display = "none";
                previewImage.src = "";
                uploadPlaceholder.style.display = "flex";
                dropZone.classList.remove("has-image");
                removeImageBtn.style.display = "none";
            };

            selectContextBtn.onclick = () => {
                parent.postMessage(
                    { pluginMessage: { type: "get-selection-context" } },
                    "*",
                );
            };

            saveKeyBtn.onclick = async () => {
                const key = apiKeyInput.value.trim();
                if (!key) {
                    keyStatus.textContent = "Please enter a key.";
                    keyStatus.style.color = "#ff4d4f";
                    return;
                }

                saveKeyBtn.disabled = true;
                saveKeyBtn.textContent = "Validating...";
                keyStatus.textContent = "Checking API key...";
                keyStatus.style.color = "var(--text-secondary)";

                try {
                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`,
                        {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "ping" }] }],
                            }),
                        },
                    );

                    if (response.ok) {
                        // Success! Save to client storage via backend
                        parent.postMessage(
                            { pluginMessage: { type: "save-api-key", key } },
                            "*",
                        );
                        keyStatus.textContent = "Key is valid and saved!";
                        keyStatus.style.color = "#52c41a";
                        setTimeout(() => {
                            saveKeyBtn.disabled = false;
                            saveKeyBtn.textContent = "Save & Validate Key";
                        }, 2000);
                    } else {
                        const errData = await response.json();
                        const errMsg =
                            errData.error?.message || response.statusText;
                        throw new Error(errMsg);
                    }
                } catch (err) {
                    console.error(err);
                    keyStatus.textContent = "Invalid Key: " + err.message;
                    keyStatus.style.color = "#ff4d4f";
                    saveKeyBtn.disabled = false;
                    saveKeyBtn.textContent = "Save & Validate Key";
                }
            };

            generateBtn.onclick = async () => {
                const prompt = promptInput.value.trim();
                const apiKey = apiKeyInput.value.trim();

                if (!apiKey) {
                    alert(
                        "Please go to Settings and configure your Gemini API Key first.",
                    );
                    document.querySelector('[data-tab="settings"]').click();
                    return;
                }

                if (!prompt && !selectedImageData) {
                    promptInput.focus();
                    return;
                }

                generateBtn.disabled = true;
                generateBtn.style.opacity = "0.7";

                const steps = [
                    "Generating...",
                    "Polishing...",
                    "Finalizing...",
                ];
                let stepIndex = 0;
                generateBtn.innerText = steps[0];

                loadingInterval = setInterval(() => {
                    stepIndex = (stepIndex + 1) % steps.length;
                    generateBtn.innerText = steps[stepIndex];
                }, 2000);

                try {
                    const systemPrompt = `
                      You are a Figma design assistant.
                      Generate a visual design based on the user's prompt.
                      Return your response as a JSON object containing a list of layers to draw.

                      IMPORTANT DESIGN INSTRUCTIONS:
                      - You are an advanced UI Designer. Create sophisticated, high-fidelity designs.
                      - **Use FRAMES with Auto Layout for almost everything.** This ensures perfect alignment and responsiveness.
                      - **Alignment Rules**: 
                        - To center a generic item: Set the **PARENT** Frame's \`primaryAxisAlignItems\` and \`counterAxisAlignItems\` to "CENTER". Do NOT try to align the child directly.
                        - To center text in a button: properties strictly on the Button Frame.
                      - **Buttons**:
                        - \`layoutMode\`: "HORIZONTAL"
                        - \`primaryAxisAlignItems\`: "CENTER" (Centers text horizontally)
                        - \`counterAxisAlignItems\`: "CENTER" (Centers text vertically)
                        - \`primaryAxisSizingMode\`: "AUTO" (Hugs content/text width)
                        - \`counterAxisSizingMode\`: "AUTO" (Hugs content/text height)
                        - \`cornerRadius\`: 8 or more
                        - Child: One TEXT node centered.
                      - **Input Fields**:
                        - \`layoutMode\`: "HORIZONTAL"
                        - \`layoutAlign\`: "STRETCH" (CRITICAL: Fills width of parent card)
                        - \`height\`: 50 (Fixed height)
                        - \`counterAxisAlignItems\`: "CENTER" (Centers text inside input)
                        - \`strokeColor\`: {r,g,b}
                      - **Cards/Containers**:
                        - \`layoutMode\`: "VERTICAL"
                        - \`padding\`: 24
                        - \`itemSpacing\`: 16
                        - \`primaryAxisSizingMode\`: "AUTO" (Hugs content height)
                        - \`counterAxisSizingMode\`: "FIXED"

                      The JSON should have the following properties available:
                      {
                        "layers": [
                          {
                            "type": "FRAME" | "RECTANGLE" | "TEXT" | "ELLIPSE" | "IMAGE" | "LINE",
                            "name": "string",
                            "x": "number", "y": "number", "width": "number", "height": "number",
                            "color": { "r": "number", "g": "number", "b": "number", "a": "number" },
                            "text": "string", "fontSize": "number", "fontWeight": "Regular" | "Medium" | "Bold",
                            "textAlignHorizontal": "LEFT" | "CENTER" | "RIGHT",
                            "textAlignVertical": "TOP" | "CENTER" | "BOTTOM",
                            "cornerRadius": "number",
                            "strokeColor": { "r": "number", "g": "number", "b": "number" },
                            "strokeWeight": "number",
                            "opacity": "number",
                            "shadow": "boolean",

                            // AUTO LAYOUT PROPERTIES (Use these!)
                            "layoutMode": "HORIZONTAL" | "VERTICAL",
                            "primaryAxisAlignItems": "MIN" | "MAX" | "CENTER" | "SPACE_BETWEEN",
                            "counterAxisAlignItems": "MIN" | "MAX" | "CENTER",
                            "itemSpacing": "number",
                            "padding": "number",
                            "primaryAxisSizingMode": "FIXED" | "AUTO", // AUTO = Hug Contents
                            "counterAxisSizingMode": "FIXED" | "AUTO", // AUTO = Hug Contents

                            // CHILD LAYOUT PROPERTIES (Inside Auto Layout)
                            "layoutAlign": "STRETCH" | "INHERIT", // STRETCH = Fill Container. (Do NOT use CENTER/MIN/MAX here)
                            "layoutGrow": 0 | 1, // 1 = Fill remaining space

                            "children": []
                          }
                        ]
                      }
                      Coordinate system: x=0, y=0 is top left.
                      Canvas width is typically 375 (mobile) or 1440 (desktop). Default to Mobile (375x812) unless specified.
                      Ensure colors are 0-1 range.
                      `;

                    const parts = [];

                    if (selectedContextTree) {
                        parts.push({
                            text:
                                "Context Layer Structure (JSON): " +
                                JSON.stringify(selectedContextTree),
                        });
                        parts.push({
                            text: "The user wants to modify this existing frame. Analyze its content but feel free to REDESIGN and MODERNIZE it. Do not just recolor - improve the layout.",
                        });
                    }

                    parts.push({
                        text: systemPrompt + "\n\nUser Request: " + prompt,
                    });

                    // Add Context Image First
                    if (selectedContextImage) {
                        const base64Data = selectedContextImage.split(",")[1];
                        const mimeType = selectedContextImage.match(
                            /data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+).*,.*/,
                        )[1];
                        parts.push({
                            inline_data: {
                                mime_type: mimeType,
                                data: base64Data,
                            },
                        });
                        parts.push({
                            text: "Above is the visual of the context frame.",
                        });
                    }

                    // Add Reference Image Second
                    if (selectedImageData) {
                        const base64Data = selectedImageData.split(",")[1];
                        const mimeType = selectedImageData.match(
                            /data:([a-zA-Z0-9]+\/[a-zA-Z0-9-.+]+).*,.*/,
                        )[1];
                        parts.push({
                            inline_data: {
                                mime_type: mimeType,
                                data: base64Data,
                            },
                        });
                        parts.push({
                            text: "Above is a reference image for style/inspiration.",
                        });
                    }

                    const response = await fetch(
                        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
                        {
                            method: "POST",
                            headers: {
                                "Content-Type": "application/json",
                            },
                            body: JSON.stringify({
                                contents: [{ parts: parts }],
                                generationConfig: {
                                    response_mime_type: "application/json",
                                },
                            }),
                        },
                    );

                    if (!response.ok) {
                        const errData = await response.json();
                        throw new Error(
                            errData.error?.message || response.statusText,
                        );
                    }

                    const data = await response.json();
                    const responseText =
                        data.candidates?.[0]?.content?.parts?.[0]?.text;

                    if (!responseText) {
                        throw new Error("No response text from Gemini.");
                    }

                    const designData = JSON.parse(responseText);

                    // Send to backend to draw
                    parent.postMessage(
                        {
                            pluginMessage: {
                                type: "draw-design",
                                designData,
                                replaceContext: replaceContextCheckbox.checked,
                                contextId: selectedContextTree
                                    ? selectedContextTree.id
                                    : null,
                            },
                        },
                        "*",
                    );
                } catch (error) {
                    if (loadingInterval) clearInterval(loadingInterval);
                    console.error("Gemini API Error:", error);
                    alert("Error generating design: " + error.message);
                    generateBtn.innerText = "Generate Design";
                    generateBtn.disabled = false;
                    generateBtn.style.opacity = "1";
                }
            };

            cancelBtn.onclick = () => {
                parent.postMessage({ pluginMessage: { type: "cancel" } }, "*");
            };

            window.onmessage = (event) => {
                const msg = event.data.pluginMessage;
                if (msg.type === "api-key") {
                    if (msg.key) {
                        apiKeyInput.value = msg.key;
                    }
                } else if (msg.type === "design-drawn") {
                    if (loadingInterval) clearInterval(loadingInterval);
                    generateBtn.innerText = "Generate Design";
                    generateBtn.disabled = false;
                    generateBtn.style.opacity = "1";
                } else if (msg.type === "selection-context") {
                    if (msg.error) {
                        alert(msg.error);
                    } else {
                        selectedContextTree = msg.tree;

                        // Process Image
                        const blob = new Blob([msg.imageBytes], {
                            type: "image/png",
                        });
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            selectedContextImage = e.target.result;

                            // Update UI
                            contextName.textContent = selectedContextTree.name;
                            contextPreview.style.backgroundImage = `url(${selectedContextImage})`;
                            contextPreview.style.display = "block";
                            selectContextBtn.textContent = "Update Context";
                            contextName.style.color = "var(--text-color)";
                            replaceContextCheckbox.disabled = false;
                        };
                        reader.readAsDataURL(blob);
                    }
                }
            };

            window.onload = () => {
                promptInput.focus();
                parent.postMessage(
                    { pluginMessage: { type: "check-api-key" } },
                    "*",
                );
            };
        </script>
    </body>
</html>
